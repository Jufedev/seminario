# Distrobox assemble manifest — recreates the "seminario" development box.
#
# Everything for this project runs inside this box (the host stays bare):
# native Kafka (KRaft) via scripts/kafka-local.sh, PySpark in a local venv,
# and the Three.js metaverse via bun.
#
# Recreate the box on a fresh host:
#   distrobox assemble create --file distrobox.ini
#   distrobox enter seminario
#
# Then, inside the box, from the repo root:
#   make setup             # create .venv and install Python deps
#   make kafka-install     # download Kafka 3.9.1 + format KRaft storage
#   make metaverse-install # bun install for the metaverse
#
# Rebuild from scratch (drop and recreate):
#   distrobox assemble create --file distrobox.ini --replace
#
# A rebuild is cheap ON PURPOSE: everything expensive lives under $HOME, which is
# shared with the host and therefore survives — the venv (.venv in the repo), Kafka
# (~/.local/kafka_2.13-3.9.1) and the bun modules. What this file installs is only
# what a bare container lacks.

[seminario]

# ---------------------------------------------------------------------------
# WHY UBUNTU 24.04 AND NOT FEDORA (which is what the host runs)
#
# Because of exactly one number: Ubuntu 24.04 ships Python 3.12 by default, and
# PySpark 3.5.1 supports Python 3.10-3.12 and NOT 3.13+. Fedora 44 ships 3.13/3.14,
# so a Fedora base would break the detector on the first import and force a parallel
# python3.12 install plus manual venv wiring — which is precisely the manual version
# management this base image was chosen to eliminate.
#
# Matching the host's distro buys nothing here: the tools that came from the host
# (engram, gentle-ai) are Go binaries and do not care about the distro, and Homebrew's
# Linux bottles target a glibc baseline that 24.04 satisfies.
#
# If PySpark is ever upgraded past 3.5, re-check this before touching the base.
# ---------------------------------------------------------------------------
image=ubuntu:24.04

# ---------------------------------------------------------------------------
# THE HOMEBREW MOUNT — this is what makes the host's tooling visible in here.
#
# Homebrew installs to /home/linuxbrew, which is a SIBLING of $HOME, not a child.
# Distrobox mounts $HOME and nothing else under /home, so the whole brew tree —
# engram, gentle-ai, everything — is invisible inside the box.
#
# And the failure is a perfect mirage: the box INHERITS the host's environment, so
# $PATH still lists /home/linuxbrew/.linuxbrew/bin. The entry is there. The directory
# is not. `brew: command not found` while `echo $PATH` shows brew — that is this.
#
# Read-only on purpose: brew is a HOST tool, managed from the host. The box only
# needs to READ the binaries, and :ro means a mistake in here cannot corrupt the
# host's installation.
#
# The project does NOT depend on this mount. Everything below is installed by this
# file, so the box still works on a host with no Homebrew — you just lose the tooling.
# ---------------------------------------------------------------------------
volume="/home/linuxbrew:/home/linuxbrew:ro"

# openjdk-17: Spark's JVM (and Kafka's — it is a JVM app, which is why this project
#             runs Kafka natively and skipped Docker entirely).
# python3.12: PySpark 3.5.1's supported interpreter (see the base-image note above).
# openssh-client: scripts/deploy-azure.sh and diagnosing the Azure VM by SSH.
# ripgrep/fd-find/bat/eza/sd: the shell toolchain this project's conventions require.
#             They were NOT here before, and `rg` only appeared to work because Claude
#             Code injects a shell FUNCTION that routes it to its own bundled ripgrep —
#             so in a plain interactive shell in this box, rg did not exist either.
additional_packages="git make curl ca-certificates unzip procps openssh-client openjdk-17-jdk python3 python3-venv python3-pip ripgrep fd-find bat eza sd"

# Ubuntu ships fd and bat under different binary names to avoid clashing with other
# packages (fdfind, batcat). Symlink them back to the names every script and habit
# expects, instead of teaching everyone two sets of names.
init_hooks="ln -sf /usr/bin/fdfind /usr/local/bin/fd; ln -sf /usr/bin/batcat /usr/local/bin/bat"

# bun is not an apt package. BUN_INSTALL sets the install root, so it lands in
# /usr/local/bin and is on PATH for the shared host-home user.
init_hooks="curl -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash"

# Azure CLI: required by scripts/deploy-azure.sh (az login, az acr build, VM start/stop).
# Not in the Ubuntu repos — installed from Microsoft's own apt repo.
init_hooks="curl -sL https://aka.ms/InstallAzureCLIDeb | bash"

# Terraform: the OTHER hard dependency of `make deploy`, and until now it was NOT
# installed by this file. It happened to work only because a copy sat in ~/.local/bin,
# in the shared host home — so on a fresh host `make deploy` would have failed with
# `terraform: command not found`, and this manifest would have been a lie.
# Pinned, and pinned LITERALLY: an unpinned Terraform is a state file whose format
# changes under you, and a shell variable in here would be expanded when the manifest
# is parsed — long before the hook runs — leaving an empty version in the URL.
init_hooks="curl -fsSL -o /tmp/tf.zip https://releases.hashicorp.com/terraform/1.15.8/terraform_1.15.8_linux_amd64.zip && unzip -o /tmp/tf.zip -d /usr/local/bin && rm -f /tmp/tf.zip && terraform version"
