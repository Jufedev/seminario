# ════════════════════════════════════════════════════════════════
#  Kafka local para desarrollo (M5) — un solo broker en modo KRaft
#  (sin Zookeeper), imagen OFICIAL apache/kafka.
#  Arrancar:  npm run kafka:up   (o docker compose up -d)
#  El servidor Node se conecta a localhost:9092; si el broker no está,
#  cae automáticamente al bus local en-proceso (misma analítica).
# ════════════════════════════════════════════════════════════════
services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: ecci-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft: este nodo es broker y controller a la vez
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # host vacío = escuchar en todas las interfaces (0.0.0.0 explícito no es válido aquí)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # broker único: factores de replicación en 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      # los topics (room.lifecycle, agent.*, route.decision, …) se crean solos
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
